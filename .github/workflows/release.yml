name: release

on:
  push:
    tags: ['v*-motrix.*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version for a dry run (no leading v)'
        default: '1.37.0-motrix.0-dev'

permissions:
  contents: write

jobs:
  version:
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.v.outputs.version }}
    steps:
    - id: v
      run: |
        if [ "${{ github.event_name }}" = "push" ]; then
          echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
        else
          echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
        fi

  macos:
    needs: version
    strategy:
      fail-fast: false
      matrix:
        include:
        - { arch: arm64,  asset_arch: arm64, runner: macos-26 }
        # Both macOS arches build on macOS 26 (Tahoe): macos-26 (arm64) and
        # macos-26-intel (x64). macos-13/14 are deprecated; macos-latest points
        # to macos-26 as of mid-2026. The shipped binary's minimum OS is pinned
        # to 11.0 by -mmacosx-version-min in scripts/build-static-osx.sh, so the
        # runner OS version does not affect the deployment target.
        - { arch: x86_64, asset_arch: x64,   runner: macos-26-intel }
    runs-on: ${{ matrix.runner }}
    steps:
    - uses: actions/checkout@v6
    - name: Inject version into configure.ac
      run: |
        sed -i '' -E "s/AC_INIT\(\[aria2\],\[[^]]+\]/AC_INIT([aria2],[${{ needs.version.outputs.version }}]/" configure.ac
        grep -qF "AC_INIT([aria2],[${{ needs.version.outputs.version }}]" configure.ac || { echo "version injection did not match AC_INIT"; exit 1; }
    - name: Cache static deps
      uses: actions/cache@v4
      with:
        path: build-release/arch
        key: osx-deps-${{ matrix.arch }}-${{ hashFiles('makerelease-osx.mk') }}
    - name: Build deps if not cached
      run: |
        brew install autoconf automake libtool pkg-config gettext
        echo "$(brew --prefix gettext)/bin" >> "$GITHUB_PATH"
        scripts/rebuild-static-osx.sh --deps-only
    - name: Build binary
      run: scripts/build-static-osx.sh ${{ matrix.arch }}
    - name: Package
      run: |
        V=${{ needs.version.outputs.version }}
        tar -C build-release/aria2.${{ matrix.arch }}/src -czf \
          "aria2c-$V-darwin-${{ matrix.asset_arch }}.tar.gz" aria2c
    - uses: actions/upload-artifact@v4
      with:
        name: darwin-${{ matrix.asset_arch }}
        path: aria2c-*-darwin-*.tar.gz

  windows:
    needs: version
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        include:
        - { host: x86_64-w64-mingw32, asset_arch: x64 }
        - { host: i686-w64-mingw32,   asset_arch: ia32 }
    steps:
    - uses: actions/checkout@v6
    - name: Inject version into configure.ac
      run: |
        sed -i -E "s/AC_INIT\(\[aria2\],\[[^]]+\]/AC_INIT([aria2],[${{ needs.version.outputs.version }}]/" configure.ac
        grep -qF "AC_INIT([aria2],[${{ needs.version.outputs.version }}]" configure.ac || { echo "version injection did not match AC_INIT"; exit 1; }
    - name: Build in mingw image
      run: |
        docker build -f Dockerfile.mingw --build-arg HOST=${{ matrix.host }} -t aria2-mingw .
        id=$(docker create aria2-mingw)
        docker cp "$id:/aria2/src/aria2c.exe" ./aria2c.exe
        docker rm "$id"
        ${{ matrix.host }}-strip ./aria2c.exe || true
    - name: Package
      run: |
        V=${{ needs.version.outputs.version }}
        zip -j "aria2c-$V-win32-${{ matrix.asset_arch }}.zip" aria2c.exe
    - uses: actions/upload-artifact@v4
      with:
        name: win32-${{ matrix.asset_arch }}
        path: aria2c-*-win32-*.zip

  linux:
    needs: version
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
        - { triple: x86_64-linux-musl,  asset_arch: x64 }
        - { triple: aarch64-linux-musl, asset_arch: arm64 }
        - { triple: armv7l-linux-musleabihf, asset_arch: armv7l }
    steps:
    - uses: actions/checkout@v6
    - name: Inject version into configure.ac
      run: |
        sed -i -E "s/AC_INIT\(\[aria2\],\[[^]]+\]/AC_INIT([aria2],[${{ needs.version.outputs.version }}]/" configure.ac
        grep -qF "AC_INIT([aria2],[${{ needs.version.outputs.version }}]" configure.ac || { echo "version injection did not match AC_INIT"; exit 1; }
    - name: Build in musl image
      run: |
        docker build -f Dockerfile.linux --build-arg TRIPLE=${{ matrix.triple }} -t aria2-linux .
        id=$(docker create aria2-linux)
        docker cp "$id:/aria2/src/aria2c" ./aria2c
        docker rm "$id"
    - name: Verify fully static
      run: file ./aria2c | grep -qE 'statically linked|static-pie'
    - name: Package
      run: |
        V=${{ needs.version.outputs.version }}
        tar -czf "aria2c-$V-linux-${{ matrix.asset_arch }}.tar.gz" aria2c
    - uses: actions/upload-artifact@v4
      with:
        name: linux-${{ matrix.asset_arch }}
        path: aria2c-*-linux-*.tar.gz

  android:
    needs: version
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@v6
    - name: Inject version into configure.ac
      run: |
        sed -i -E "s/AC_INIT\(\[aria2\],\[[^]]+\]/AC_INIT([aria2],[${{ needs.version.outputs.version }}]/" configure.ac
        grep -qF "AC_INIT([aria2],[${{ needs.version.outputs.version }}]" configure.ac || { echo "version injection did not match AC_INIT"; exit 1; }
    - name: Build in android image
      run: |
        docker build -f Dockerfile.android -t aria2-android .
        id=$(docker create aria2-android)
        docker cp "$id:/aria2/src/aria2c" ./aria2c
        docker rm "$id"
    - name: Package
      run: |
        V=${{ needs.version.outputs.version }}
        tar -czf "aria2c-$V-android-arm.tar.gz" aria2c
    - uses: actions/upload-artifact@v4
      with:
        name: android-arm
        path: aria2c-*-android-arm.tar.gz

  publish:
    needs: [macos, windows, linux, android]
    if: github.event_name == 'push'
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/download-artifact@v4
      with: { path: dist, merge-multiple: true }
    - name: Generate SHA256SUMS
      run: cd dist && sha256sum aria2c-* > SHA256SUMS
    - name: Create/refresh release
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        gh release create "${GITHUB_REF_NAME}" dist/* \
          --repo "${GITHUB_REPOSITORY}" \
          --title "${GITHUB_REF_NAME}" \
          --notes "aria2 fork build for Motrix. Base: upstream 1.37.0." \
          || gh release upload "${GITHUB_REF_NAME}" dist/* --repo "${GITHUB_REPOSITORY}" --clobber
